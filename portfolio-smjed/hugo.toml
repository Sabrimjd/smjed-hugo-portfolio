baseURL = "https://smjed.net"
title   = "SMJED"
languageCode = "en-us"
theme = "hello-friend-ng-sab"

PygmentsCodeFences = true
PygmentsStyle = "monokai"

copyright = "This work is licensed under a Creative Commons Attribution-NonCommercial 4.0 International License." # This message is only used by the RSS template.

archetypeDir = "archetypes"
contentDir   = "content"
dataDir      = "data"
layoutDir    = "layouts"
publishDir   = "public"

ignoreLogs = ['warning-goldmark-raw-html']

buildDrafts  = false
buildFuture  = false
buildExpired = false
canonifyURLs = true

enableRobotsTXT = true
enableGitInfo   = false
enableEmoji     = true
enableMissingTranslationPlaceholders = false
disableRSS     = false
disableSitemap = false
disable404     = false
disableHugoGeneratorInject = false

[markup.goldmark.renderer]
unsafe= true


[pagination]
  disableAliases = false
  pagerSize = 20
  path = 'page'

[services]
  [services.rss]
      # Maximum number of items in the RSS feed.
      limit = 42

#   [services.disqus]
#     shortname = 'your-disqus-shortname'
#   [services.googleAnalytics]
#     ID = 'G-MEASUREMENT_ID'

[permalinks]
  posts = "/posts/:year/:month/:title/"

[blackfriday]
  hrefTargetBlank = true

[taxonomies]
  tag      = "tags"
  category = "categories"
  series   = "series"

[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"

  # Metadata mostly used in document's head
  #
  description = "Site Reliability Engineer with a DevOps background, focused on Kubernetes, observability, automation, and platform reliability"
  keywords = ""
  images = [""]

  # Home subtitle of the index page.
  #
  homeSubtitle = "Site Reliability Engineer with a DevOps background"

  # Set a background for the homepage
  # backgroundImage = "assets/images/background.jpg"

  # Prefix of link to the git commit detail page. GitInfo must be enabled.
  #
  gitUrl = "https://github.com/Sabrimjd/smjed-hugo-portfolio"

  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  #
  disableReadOtherPosts = false

  # Enable theme toggle
  #
  # This options enables the theme toggle for the theme.
  # Per default, this option is off.
  # The theme is respecting the prefers-color-scheme of the operating system.
  # With this option on, the page user is able to set the scheme he wants.
  enableThemeToggle = false

  # Sharing buttons
  #
  # There are a lot of buttons preconfigured. If you want to change them,
  # generate the buttons here: https://sharingbuttons.io
  # and add them into your own `layouts/partials/sharing-buttons.html`
  #
  enableSharingButtons = false

  # Global language menu
  #
  # Enables the global language menu.
  #
  enableGlobalLanguageMenu = true

  # Integrate Javascript files or stylesheets by adding the url to the external assets or by
  # linking local files with their path relative to the static folder, e.g. "css/styles.css"
  #
  customCSS = []
  customJS  = []

  # Toggle this option need to rebuild SCSS, requires extended version of Hugo
  #
  justifyContent = false  # Set "text-align: justify" to .post-content.

  # Integrate Plausible.io
  # plausibleDataDomain = 'test.com'
  # plausibleScriptSource = 'https://plausible.io/js/script.js'

  [params.author]
    name = "Sabri MJAHED"

  # Custom footer
  # If you want, you can easily override the default footer with your own content.
  #
  [params.footer]
    trademark = 2025
    rss = true
    copyright = true
    author = true

    topText = []
    bottomText = [
      "Powered by <a href=\"http://gohugo.io\">Hugo</a>"
    ]

  # Colors for favicons
  #
  [params.favicon.color]
    mask = "#1b1c1d"
    msapplication = "#1b1c1d"
    theme = "#1b1c1d"

  [params.logo]
    logoMark     = ">"
    logoText     = "SMJED Engineering"
    logoHomeLink = "/"
    # Set true to remove the logo cursor entirely.
    # logoCursorDisabled = false
    # Set to a valid CSS color to change the cursor in the logo.
    # logoCursorColor    = "#67a2c9"
    # Set to a valid CSS time value to change the animation duration, "0s" to disable.
    # logoCursorAnimate  = "2s"
    # Append the current url pathname to logoText
    # logoCursorPathname = true

  # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
  # Addon: Startpage portrait
  # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
  # Uncomment this if you want a portrait on your start page
  #
  [params.portrait]
    path     = "/img/profile.png"
    alt      = "Portrait"
    maxWidth = "150px"

  [params.homeOpenSource]
    enable = true
    [[params.homeOpenSource.projects]]
      key = "sshplex"
      name = "SSHplex"
      url = "https://github.com/Sabrimjd/SSHPlex"
      blog = "/posts/building_sshplex/"
      image = "https://raw.githubusercontent.com/Sabrimjd/SSHPlex/main/demo/demo.gif"
      badges = ["Python", "TUI", "SSH", "NetBox", "Consul"]
    [[params.homeOpenSource.projects]]
      key = "openclaw"
      name = "OpenClaw Audit TUI"
      url = "https://github.com/Sabrimjd/openclaw-audit-tui"
      image = "https://raw.githubusercontent.com/Sabrimjd/openclaw-audit-tui/main/screenshots/screenshot3.png"
      badges = ["TypeScript", "Audit", "TUI", "OpenClaw", "Observability"]
    [[params.homeOpenSource.projects]]
      key = "codexbar"
      name = "Hypr CodexBar"
      url = "https://github.com/Sabrimjd/hypr-codexbar"
      image = "https://raw.githubusercontent.com/Sabrimjd/hypr-codexbar/master/assets/waybar-tooltip.png"
      badges = ["Shell", "Waybar", "Hyprland", "CLI", "Developer UX"]

