# ─── Services ───────────────────────────────────────────────────

[servicesTitle]
other = "Ce que nous faisons"

[servicesIntro]
other = "Engineering d'infrastructure on-prem, private-cloud et hybride. Observabilité, automatisation, virtualisation et IA privée — pour les équipes qui doivent garder les workloads sensibles sous leur propre contrôle."

[svcObsTitle]
other = "Observabilité à grande échelle"

[svcObsDesc]
other = "Grafana, Loki, Thanos, Vector, Elasticsearch. Audits de stack, tuning d'ingestion, migrations Fluentd vers Vector, recording rules, performance des requêtes et dashboards SLO."

[svcAutoTitle]
other = "Automatisation infra & IaC"

[svcAutoDesc]
other = "Modules Terraform multi-provider, Ansible, pipelines GitOps, inventaire Consul et NetBox. L'automatisation qui permet aux petites équipes d'opérer à l'échelle d'une flotte."

[svcOnpremTitle]
other = "Proxmox / Ceph / on-prem HA"

[svcOnpremDesc]
other = "100+ noeuds Proxmox déployés avec automatisation PXE. Backends de stockage dont ZFS, NFS, SAN, NVMe-oF et Ceph. Migrations depuis vSphere, conception de clusters HA."

# ─── Sovereign AI ───────────────────────────────────────────────

[sovereignTitle]
other = "IA privée pour les équipes infrastructure"

[sovereignDesc]
other = "Certaines données opérationnelles ne doivent pas quitter votre réseau : incidents, logs, runbooks, docs internes et procédures. (Re)Take construit des systèmes d'IA locaux pour ces environnements : serving de modèles vLLM, pipelines RAG privés, assistants avec RBAC, et intégrations avec votre stack Proxmox, observabilité et documentation existante. Aucune dépendance API externe pour les workflows sensibles, coûts prévisibles, contrôle total des données."

[sovereignTag1]
other = "Serving LLM local"

[sovereignTag2]
other = "Conscient RGPD"

[sovereignTag3]
other = "Pipelines RAG privés"

[sovereignTag4]
other = "Souveraineté des données"

# ─── Proof ──────────────────────────────────────────────────────

[proofTitle]
other = "Sélection de réalisations"

[proofIntro]
other = "Quelques preuves sur 10 ans d'infrastructure qui ne peut pas tomber en silence."

[proof1Title]
other = "Observabilité à très haute enjeux"

[proof1Metric]
other = "11 TB/jour - 400 pods Loki - 50TB Thanos"

[proof1Desc]
other = "Exploitation d'une observabilité multi-cluster à 11 TB/jour répartis sur Loki, Elasticsearch et Thanos. Tuning d'ingestion, migration Fluentd vers Vector, recording rules convertissant des TB/jour de logs de load-balancers en métriques. Dans un métier où quelques minutes d'indisponibilité ont un impact à sept chiffres."

[proof2Title]
other = "Pipeline de livraison de VMs"

[proof2Metric]
other = "3000 VMs - 4 providers - Git jusqu'au monitoring"

[proof2Desc]
other = "Construction d'un pipeline autonome de livraison de VMs en 6 phases : Git PR, Terraform sur vSphere/Proxmox/OpenStack, auto-enregistrement Consul et NetBox, configuration Ansible, inscription backend HAProxy, monitoring Centreon. Sans Kubernetes."

[proof3Title]
other = "Infrastructure IA on-prem"

[proof3Metric]
other = "6 GPUs - 1000+ PDFs - serving vLLM"

[proof3Desc]
other = "Déploiement de serveurs équipés GPU en datacenter faisant tourner vLLM avec un pipeline RAG privé sur 1000+ documents. Création de Graphia, un agent SRE avec RBAC qui abstrait la complexité de Grafana pour les équipes engineering."

