{{ $skills := slice }}
{{ range .Site.Params.skills.categories }}
    {{ range .items }}
        {{ $skills = $skills | append . }}
    {{ end }}
{{ end }}
<div class="skill-search-wrap">
  <input type="text" id="skillSearch" placeholder="Search 40+ skills..." class="skill-search-input" autocomplete="off">
  <div id="searchResults" class="search-results"></div>
</div>
<script>
(function(){
  const skills = {{ $skills | jsonify | safeJS }};
  const input = document.getElementById('skillSearch');
  const results = document.getElementById('searchResults');
  if(!input||!results) return;
  input.addEventListener('input', function(e){
    const q = e.target.value.toLowerCase();
    if(q.length < 1){ results.classList.remove('show'); results.innerHTML=''; return; }
    const hits = skills.filter(s => s.toLowerCase().includes(q));
    if(hits.length === 0){ results.classList.remove('show'); results.innerHTML=''; return; }
    results.innerHTML = hits.map(s => '<a href="/tags/'+s.toLowerCase().replace(/\\s+/g,'-')+'/" class="skill-result">'+s+'</a>').join('');
    results.classList.add('show');
  });
  document.addEventListener('click', function(e){
    if(!input.contains(e.target) && !results.contains(e.target)){ results.classList.remove('show'); }
  });
  results.addEventListener('click', function(e){ e.stopPropagation(); });
})();
</script>
