{{ with .Site.Params.skills.categories }}
<div class="skills-grid">
  {{ range . }}
  <section class="skill-cat-box">
    <h2>{{ .name }}</h2>
    <div class="skill-items-list">
      {{ range .items }}
      {{ $icon := index $.Site.Params.skills.icons . }}
      <a href="/tags/{{ . | urlize }}/" class="skill-chip">
        {{ if and $icon (fileExists (printf "static%s" $icon)) }}
        <img src="{{ $icon }}" alt="" loading="lazy">
        {{ end }}
        <span>{{ . }}</span>
      </a>
      {{ end }}
    </div>
  </section>
  {{ end }}
</div>
{{ end }}
