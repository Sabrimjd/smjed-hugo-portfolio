{{ $skills := slice }}
{{ range .Site.Params.skills.categories }}
    {{ range .items }}
        {{ $skills = $skills | append . }}
    {{ end }}
{{ end }}

<div class="skills-search-container">
    <input type="text" id="skillSearch" placeholder="Search skills..." class="skill-search-input">
    <div id="searchResults" class="search-results hidden"></div>
</div>

<script>
const skills = {{ $skills | jsonify | safeJS }};
const searchInput = document.getElementById('skillSearch');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();
    if (searchTerm.length < 2) {
        searchResults.classList.add('hidden');
        searchResults.innerHTML = '';
        return;
    }

    const filteredSkills = skills.filter(skill => 
        skill.toLowerCase().includes(searchTerm)
    );

    if (filteredSkills.length === 0) {
        searchResults.classList.add('hidden');
        searchResults.innerHTML = '';
        return;
    }

    searchResults.innerHTML = filteredSkills
        .map(skill => `<a href="/tags/${skill.toLowerCase()}" class="skill-result">${skill}</a>`)
        .join('');
    searchResults.classList.remove('hidden');
});

// Hide search results when clicking outside
document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.classList.add('hidden');
    }
});

// Prevent hiding when clicking inside search results
searchResults.addEventListener('click', function(e) {
    e.stopPropagation();
});
</script>

<style>
.skills-search-container {
    margin: 1rem 0;
    position: relative;
}

.skill-search-input {
    width: 100%;
    padding: 0.85rem 1rem;
    font-size: 1rem;
    font-family: var(--mono, inherit);
    border: 1px solid var(--glass-border, rgba(120,120,120,0.2));
    border-radius: var(--radius-md, 10px);
    background: var(--glass-bg, rgba(120,120,120,0.05));
    -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
    color: var(--color);
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
}

.skill-search-input::placeholder {
    opacity: 0.55;
}

.skill-search-input:focus {
    outline: none;
    border-color: var(--blue, #3b82f6);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

.search-results {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--glass-bg, rgba(30, 31, 34, 0.9));
    -webkit-backdrop-filter: blur(16px) saturate(140%);
            backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
    border-radius: var(--radius-md, 10px);
    max-height: 300px;
    overflow-y: auto;
    z-index: 1000;
    box-shadow: var(--shadow-md, 0 12px 30px rgba(0, 0, 0, 0.35));
    opacity: 0;
    transform: translateY(-10px);
    animation: slideDown 0.2s ease forwards;
    display: block;
}

.search-results.hidden {
    display: none;
}

@keyframes slideDown {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

[data-theme="dark"] .search-results {
    background: var(--glass-bg, rgba(27, 28, 29, 0.92));
}

.skill-result {
    display: block;
    padding: 0.7rem 1rem;
    text-decoration: none;
    color: var(--color);
    transition: background 0.18s ease, color 0.18s ease, padding-left 0.18s ease;
    border-bottom: 1px solid var(--glass-border, rgba(120,120,120,0.12));
}

.skill-result:last-child {
    border-bottom: none;
}

.skill-result:hover {
    background: var(--blue-soft, rgba(59, 130, 246, 0.12));
    color: var(--blue, #3b82f6);
    padding-left: 1.25rem;
}
</style>
