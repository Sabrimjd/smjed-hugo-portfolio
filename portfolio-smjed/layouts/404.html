{{ define "main" }}
<style>
    .notfound {
        max-width: 620px;
        margin: 4rem auto;
        text-align: center;
        padding: 2.4rem 1.6rem;
        border: 1px solid var(--glass-border, rgba(120,120,120,0.18));
        border-radius: var(--radius-lg, 16px);
        background: var(--glass-bg, rgba(120,120,120,0.04));
        -webkit-backdrop-filter: blur(14px) saturate(140%);
                backdrop-filter: blur(14px) saturate(140%);
        box-shadow: var(--shadow-sm, 0 2px 8px rgba(0,0,0,0.08));
    }
    .notfound .code {
        font-size: 5rem;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.02em;
        color: var(--blue, #3b82f6);
    }
    .notfound .code::after {
        content: "";
        display: block;
        width: 48px;
        height: 3px;
        background: var(--blue, #3b82f6);
        border-radius: 2px;
        margin: 0.8rem auto 0;
    }
    .notfound h1 {
        font-size: 1.3rem;
        margin: 1.2rem 0 0.5rem;
    }
    .notfound p {
        opacity: 0.8;
        margin: 0 auto 1.6rem;
        line-height: 1.55;
        max-width: 460px;
    }
    .notfound .links {
        display: flex;
        gap: 0.7rem;
        justify-content: center;
        flex-wrap: wrap;
    }
    .notfound .links a {
        display: inline-block;
        padding: 0.55rem 1.1rem;
        border-radius: var(--radius-sm, 8px);
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 500;
        border: 1px solid var(--glass-border, rgba(120, 120, 120, 0.3));
        background: var(--surface-1, transparent);
        transition: transform 0.18s var(--ease-out, ease), border-color 0.18s ease, color 0.18s ease;
    }
    .notfound .links a:hover {
        transform: translateY(-2px);
        border-color: var(--blue-border, rgba(59,130,246,0.25));
        color: var(--blue, #3b82f6);
    }
    .notfound .links a.primary {
        background: var(--blue, #3b82f6);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 8px 22px rgba(59, 130, 246, 0.35);
    }
    .notfound .links a.primary:hover {
        color: #fff;
        box-shadow: 0 12px 30px rgba(59, 130, 246, 0.5);
    }
    @media (max-width: 480px) {
        .notfound .code { font-size: 3.6rem; }
    }
</style>

<main>
    <section class="notfound">
        <div class="code">404</div>
        <h1>This page drifted off-cluster</h1>
        <p>
            The page you're looking for doesn't exist or has been moved.
            Here are a few places worth landing on instead.
        </p>
        <div class="links">
            <a class="primary" href="{{ "" | relLangURL }}">Home</a>
            <a href="{{ "cv/" | relLangURL }}">CV</a>
            <a href="{{ "skills/" | relLangURL }}">Skills</a>
            <a href="{{ "open-source/" | relLangURL }}">Open Source</a>
            <a href="mailto:contact@smjed.net">Contact</a>
        </div>
    </section>
</main>
{{ end }}
